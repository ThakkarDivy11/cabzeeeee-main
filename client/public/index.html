<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/cabzee-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#001F3F" />
    <meta
      name="description"
      content="CabZee - Fast, reliable, and affordable cab rides at your fingertips. Book your ride in seconds."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/cabzee-logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored === 'light' ? 'light' : 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <title>CabZee - Your Ride, Your Way</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
